<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Power Language Wordle · daily word puzzle</title>
  <meta name="description" content="Guess the hidden word in 6 tries. A fresh puzzle every day in UTC. Flip tiles, track stats, and share results.">
  <meta name="theme-color" content="#6aaa64">
  <meta property="og:title" content="Power Language Wordle">
  <meta property="og:description" content="Daily word game – train your vocabulary with style.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/icons/wordle-og.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1 class="title">POWER WORDLE</h1>
      <div class="header-controls">
        <button class="icon-btn" id="stats-btn" aria-label="Statistics">📊</button>
        <button class="icon-btn" id="share-btn" aria-label="Share">📋</button>
      </div>
    </header>

    <main>
      <!-- game board 6x5 -->
      <div class="board" id="board" aria-label="game board, 6 rows of 5 letters">
        <!-- generated by js -->
      </div>

      <!-- on-screen keyboard (exactly as in image, plus delete) -->
      <div class="keyboard" id="keyboard">
        <div class="keyboard-row" id="row1">
          <button class="key" data-key="Q">Q</button>
          <button class="key" data-key="W">W</button>
          <button class="key" data-key="E">E</button>
          <button class="key" data-key="R">R</button>
          <button class="key" data-key="T">T</button>
          <button class="key" data-key="Y">Y</button>
          <button class="key" data-key="U">U</button>
          <button class="key" data-key="I">I</button>
          <button class="key" data-key="O">O</button>
          <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row" id="row2">
          <button class="key" data-key="A">A</button>
          <button class="key" data-key="S">S</button>
          <button class="key" data-key="D">D</button>
          <button class="key" data-key="F">F</button>
          <button class="key" data-key="G">G</button>
          <button class="key" data-key="H">H</button>
          <button class="key" data-key="J">J</button>
          <button class="key" data-key="K">K</button>
          <button class="key" data-key="L">L</button>
        </div>
        <div class="keyboard-row" id="row3">
          <button class="key enter" data-key="ENTER">ENTER</button>
          <button class="key" data-key="Z">Z</button>
          <button class="key" data-key="X">X</button>
          <button class="key" data-key="C">C</button>
          <button class="key" data-key="V">V</button>
          <button class="key" data-key="B">B</button>
          <button class="key" data-key="N">N</button>
          <button class="key" data-key="M">M</button>
          <button class="key delete" data-key="BACKSPACE">⌫</button>
        </div>
      </div>

      <div class="message" id="message"></div>
    </main>

    <!-- simple stats modal (hidden by default) -->
    <div class="modal" id="stats-modal">
      <div class="modal-content">
        <span class="close-btn" id="close-stats">&times;</span>
        <h2>Statistics</h2>
        <div class="stats-grid">
          <div><span id="games-played">0</span><br>Played</div>
          <div><span id="win-rate">0</span><br>Win %</div>
          <div><span id="current-streak">0</span><br>Streak</div>
          <div><span id="max-streak">0</span><br>Max</div>
        </div>
        <div class="share-result" id="share-result-container">
          <button id="copy-share" class="share-button">📋 copy result</button>
        </div>
      </div>
    </div>
  </div>

  <!-- word lists (injected as global) -->
  <script src="words.js"></script>
  <script src="answers.js"></script>
  <script src="script.js"></script>
</body>
</html>
